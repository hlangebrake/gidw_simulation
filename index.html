<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2D Kugelphysik</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #5a4712;
      --bg-bottom: #7a6120;
      --floor-top: #5c677d;
      --floor-bottom: #2f3b52;
      --ball-fill: #f4a261;
      --ball-shadow: rgba(0, 0, 0, 0.28);
      --text: rgba(255, 255, 255, 0.9);
      --hint: rgba(255, 255, 255, 0.6);
    }

    * {
      box-sizing: border-box;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .hud {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 1;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(13, 27, 42, 0.42);
      backdrop-filter: blur(10px);
      color: var(--text);
      user-select: none;
      pointer-events: none;
      max-width: min(360px, calc(100vw - 36px));
    }

    .hud strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
      font-weight: 700;
    }

    .hud span {
      display: block;
      color: var(--hint);
      font-size: 13px;
      line-height: 1.4;
    }

    .hud button,
    .hud .sensor-status {
      margin-top: 10px;
      pointer-events: auto;
    }

    .hud button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(244, 162, 97, 0.92);
      color: #10253d;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .hud button[hidden] {
      display: none;
    }

    .hud .sensor-status {
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="hud">
    <strong>2D Kugelphysik</strong>
    <span>Kugel greifen, ziehen und loslassen. Danach wirken Schwerkraft, Boden und D&auml;mpfung.</span>
    <button id="sensorButton" type="button">Bewegungssensoren aktivieren</button>
    <div id="sensorStatus" class="sensor-status">Sensoren sind noch nicht aktiviert.</div>
  </div>
  <canvas id="scene" aria-label="Physiksimulation einer Kugel"></canvas>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const sensorButton = document.getElementById("sensorButton");
    const sensorStatus = document.getElementById("sensorStatus");

    const state = {
      width: 0,
      height: 0,
      floorHeight: 88,
      lastTime: performance.now(),
      gravity: 1800,
      airDrag: 0.0008,
      bounce: 0.52,
      rollingFriction: 0.985,
      maxFloorTilt: 0.42,
      arrowScale: 26,
      motionReady: false,
      motionListening: false,
      motionDetected: false,
      motionCheckTimer: null,
      motionFilter: { x: 0, y: 0, z: 0 },
      linearAcceleration: { x: 0, y: 0 },
      tilt: { x: 0, y: 0 },
      arrow: { x: 0, y: 0 },
      ball: {
        radius: 34,
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        dragged: false,
        pointerId: null,
        dragOffsetX: 0,
        dragOffsetY: 0,
        history: []
      }
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      canvas.width = Math.round(state.width * dpr);
      canvas.height = Math.round(state.height * dpr);
      canvas.style.width = state.width + "px";
      canvas.style.height = state.height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const floorY = getFloorYAt(state.width * 0.5);
      if (state.ball.x === 0 && state.ball.y === 0) {
        state.ball.x = state.width * 0.5;
        state.ball.y = floorY - state.ball.radius;
      } else {
        state.ball.x = clamp(state.ball.x, state.ball.radius, state.width - state.ball.radius);
        const constrainedFloorY = getFloorYAt(state.ball.x);
        state.ball.y = Math.min(state.ball.y, constrainedFloorY - state.ball.radius);
      }
    }

    function getFloorAngle() {
      return clamp(state.tilt.x, -1, 1) * state.maxFloorTilt;
    }

    function getFloorSlope() {
      return Math.tan(getFloorAngle());
    }

    function getFloorAnchorY() {
      return state.height - state.floorHeight;
    }

    function getFloorYAt(x) {
      return getFloorAnchorY() + (x - state.width * 0.5) * getFloorSlope();
    }

    function getFloorNormal() {
      const slope = getFloorSlope();
      const length = Math.hypot(slope, 1);
      return { x: slope / length, y: -1 / length };
    }

    function getFloorTangent() {
      const slope = getFloorSlope();
      const length = Math.hypot(1, slope);
      return { x: 1 / length, y: slope / length };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setSensorStatus(message, showButton = true) {
      sensorStatus.textContent = message;
      sensorButton.hidden = !showButton;
    }

    function getOrientationAngle() {
      if (typeof screen.orientation?.angle === "number") {
        return screen.orientation.angle;
      }
      if (typeof window.orientation === "number") {
        return window.orientation;
      }
      return 0;
    }

    function mapAccelerationToScreenAxes(x, y) {
      switch (getOrientationAngle()) {
        case 90:
          return { x: -y, y: x };
        case -90:
        case 270:
          return { x: y, y: -x };
        case 180:
        case -180:
          return { x: -x, y: -y };
        default:
          return { x, y };
      }
    }

    function smoothVector(current, target, factor) {
      current.x += (target.x - current.x) * factor;
      current.y += (target.y - current.y) * factor;
    }

    function handleDeviceMotion(event) {
      const gravitySource = event.accelerationIncludingGravity || event.acceleration;
      const linearSource = event.acceleration;
      const source = gravitySource || linearSource;
      if (!source) {
        return;
      }

      state.motionDetected = true;
      if (state.motionCheckTimer) {
        clearTimeout(state.motionCheckTimer);
        state.motionCheckTimer = null;
      }

      if (!state.motionReady) {
        state.motionReady = true;
        setSensorStatus("Bewegungssensoren sind aktiv.", false);
      }

      const rawGravityX = gravitySource?.x ?? source.x ?? 0;
      const rawGravityY = gravitySource?.y ?? source.y ?? 0;
      const mappedGravity = mapAccelerationToScreenAxes(rawGravityX, rawGravityY);
      const gravityVector = {
        x: clamp(mappedGravity.x / 9.81, -1, 1),
        y: clamp(mappedGravity.y / 9.81, -1, 1)
      };

      smoothVector(state.motionFilter, { x: gravityVector.x, y: gravityVector.y }, 0.16);
      smoothVector(state.tilt, state.motionFilter, 0.18);

      let mappedLinear;
      if (linearSource && (linearSource.x !== null || linearSource.y !== null)) {
        mappedLinear = mapAccelerationToScreenAxes(linearSource.x ?? 0, linearSource.y ?? 0);
      } else {
        mappedLinear = {
          x: (gravityVector.x - state.tilt.x) * 9.81,
          y: (gravityVector.y - state.tilt.y) * 9.81
        };
      }

      smoothVector(state.linearAcceleration, mappedLinear, 0.22);
      const arrowTarget = {
        x: clamp(state.linearAcceleration.x / 6, -1.2, 1.2),
        y: clamp(state.linearAcceleration.y / 6, -1.2, 1.2)
      };
      smoothVector(state.arrow, arrowTarget, 0.28);

      const tiltMagnitude = Math.hypot(state.tilt.x, state.tilt.y);
      if (tiltMagnitude > 0.08) {
        sensorStatus.textContent = "Neigung aktiv: Der Boden ist schraeg und die Kugel rollt bergab.";
      }
    }

    function scheduleMotionAvailabilityCheck(permissionState) {
      if (state.motionCheckTimer) {
        clearTimeout(state.motionCheckTimer);
      }

      state.motionCheckTimer = window.setTimeout(() => {
        if (state.motionDetected) {
          return;
        }

        const runningAsFile = window.location.protocol === "file:";
        const deniedBySafari = permissionState === "denied";
        if (runningAsFile) {
          setSensorStatus("Keine Sensordaten verfuegbar. Auf dem iPad blockiert Safari lokale HTML-Dateien oft fuer Bewegungssensoren.", true);
          return;
        }

        if (deniedBySafari) {
          setSensorStatus("Safari liefert keine Sensordaten an die Seite.", true);
          return;
        }

        setSensorStatus("Es kommen keine Sensordaten an. Bitte Safari-Sensorfreigabe pruefen und erneut tippen.", true);
      }, 1400);
    }

    function startMotionListener(permissionState = "unknown") {
      if (state.motionListening) {
        setSensorStatus(state.motionDetected ? "Bewegungssensoren sind aktiv." : "Warte auf Sensordaten ...", !state.motionDetected);
        scheduleMotionAvailabilityCheck(permissionState);
        return;
      }

      window.addEventListener("devicemotion", handleDeviceMotion);
      state.motionListening = true;
      state.motionReady = false;
      state.motionDetected = false;
      setSensorStatus("Warte auf Sensordaten ...", true);
      scheduleMotionAvailabilityCheck(permissionState);
    }

    async function enableMotion() {
      if (typeof DeviceMotionEvent === "undefined") {
        setSensorStatus("Dieses Geraet liefert keine Bewegungssensoren.", false);
        return;
      }

      try {
        if (typeof DeviceMotionEvent.requestPermission === "function") {
          const permission = await DeviceMotionEvent.requestPermission();
          if (permission !== "granted") {
            startMotionListener(permission);
            return;
          }

          startMotionListener(permission);
          return;
        }

        startMotionListener("implicit");
      } catch (error) {
        setSensorStatus("Sensoren konnten nicht aktiviert werden.", true);
      }
    }

    function getPointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function isPointerOnBall(pos) {
      const dx = pos.x - state.ball.x;
      const dy = pos.y - state.ball.y;
      return dx * dx + dy * dy <= state.ball.radius * state.ball.radius;
    }

    function startDrag(event) {
      const pos = getPointerPosition(event);
      if (!isPointerOnBall(pos)) {
        return;
      }

      state.ball.dragged = true;
      state.ball.pointerId = event.pointerId;
      state.ball.dragOffsetX = state.ball.x - pos.x;
      state.ball.dragOffsetY = state.ball.y - pos.y;
      state.ball.vx = 0;
      state.ball.vy = 0;
      state.ball.history = [];
      canvas.classList.add("dragging");
      canvas.setPointerCapture(event.pointerId);
    }

    function moveDrag(event) {
      if (!state.ball.dragged || event.pointerId !== state.ball.pointerId) {
        return;
      }

      const pos = getPointerPosition(event);
      const nextX = clamp(state.ball.dragOffsetX + pos.x, state.ball.radius, state.width - state.ball.radius);
      const nextY = clamp(state.ball.dragOffsetY + pos.y, state.ball.radius, getFloorYAt(nextX) - state.ball.radius);

      state.ball.x = nextX;
      state.ball.y = nextY;

      const now = performance.now();
      state.ball.history.push({ x: nextX, y: nextY, t: now });
      while (state.ball.history.length > 8 || (state.ball.history.length > 1 && now - state.ball.history[0].t > 120)) {
        state.ball.history.shift();
      }
    }

    function endDrag(event) {
      if (!state.ball.dragged || event.pointerId !== state.ball.pointerId) {
        return;
      }

      const history = state.ball.history;
      if (history.length >= 2) {
        const first = history[0];
        const last = history[history.length - 1];
        const dt = Math.max((last.t - first.t) / 1000, 1 / 240);
        state.ball.vx = (last.x - first.x) / dt;
        state.ball.vy = (last.y - first.y) / dt;
      }

      state.ball.dragged = false;
      state.ball.pointerId = null;
      state.ball.history = [];
      canvas.classList.remove("dragging");
      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    function update(dt) {
      const ball = state.ball;
      if (ball.dragged) {
        return;
      }

      ball.vy += state.gravity * dt;
      const dragFactor = Math.max(0, 1 - state.airDrag * dt * 1000);
      ball.vx *= dragFactor;
      ball.vy *= dragFactor;

      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      const radius = ball.radius;

      if (ball.x < radius) {
        ball.x = radius;
        ball.vx *= -state.bounce * 0.85;
      } else if (ball.x > state.width - radius) {
        ball.x = state.width - radius;
        ball.vx *= -state.bounce * 0.85;
      }

      const tangent = getFloorTangent();
      const normal = getFloorNormal();
      const anchorX = state.width * 0.5;
      const anchorY = getFloorAnchorY();
      const distanceToFloor = (ball.x - anchorX) * normal.x + (ball.y - anchorY) * normal.y;

      if (distanceToFloor < radius) {
        const penetration = radius - distanceToFloor;
        ball.x += normal.x * penetration;
        ball.y += normal.y * penetration;

        const velocityAlongNormal = ball.vx * normal.x + ball.vy * normal.y;
        let velocityAlongTangent = ball.vx * tangent.x + ball.vy * tangent.y;
        const slopeAcceleration = state.gravity * tangent.y;
        let nextNormalVelocity = 0;

        if (velocityAlongNormal < -20) {
          nextNormalVelocity = -velocityAlongNormal * state.bounce;
        }

        velocityAlongTangent += slopeAcceleration * dt;
        velocityAlongTangent *= state.rollingFriction;
        if (Math.abs(velocityAlongTangent) < 1.5 && Math.abs(slopeAcceleration) < 18) {
          velocityAlongTangent = 0;
        }

        ball.vx = tangent.x * velocityAlongTangent + normal.x * nextNormalVelocity;
        ball.vy = tangent.y * velocityAlongTangent + normal.y * nextNormalVelocity;
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, state.height);
      sky.addColorStop(0, "#6b5417");
      sky.addColorStop(0.65, "#9d7c1f");
      sky.addColorStop(1, "#c6a43a");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, state.width, state.height);

      const leftFloorY = getFloorYAt(0);
      const rightFloorY = getFloorYAt(state.width);
      const floorTop = Math.min(leftFloorY, rightFloorY);
      const floor = ctx.createLinearGradient(0, floorTop, 0, state.height);
      floor.addColorStop(0, "#73829b");
      floor.addColorStop(1, "#2d3648");
      ctx.fillStyle = floor;
      ctx.beginPath();
      ctx.moveTo(0, leftFloorY);
      ctx.lineTo(state.width, rightFloorY);
      ctx.lineTo(state.width, state.height);
      ctx.lineTo(0, state.height);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 255, 255, 0.14)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, leftFloorY);
      ctx.lineTo(state.width, rightFloorY);
      ctx.stroke();

      drawAccelerationArrow();
    }

    function drawAccelerationArrow() {
      const cx = state.width * 0.5;
      const cy = Math.max(140, state.height * 0.28);
      const dx = state.arrow.x * state.arrowScale * 6;
      const dy = state.arrow.y * state.arrowScale * 6;
      const magnitude = Math.hypot(dx, dy);

      ctx.save();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.14)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, 52, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
      ctx.fill();

      if (magnitude > 4) {
        const angle = Math.atan2(dy, dx);
        const head = 16;
        const left = angle + Math.PI * 0.82;
        const right = angle - Math.PI * 0.82;

        ctx.strokeStyle = "rgba(255, 255, 255, 0.42)";
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + dx, cy + dy);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(cx + dx, cy + dy);
        ctx.lineTo(cx + dx + Math.cos(left) * head, cy + dy + Math.sin(left) * head);
        ctx.lineTo(cx + dx + Math.cos(right) * head, cy + dy + Math.sin(right) * head);
        ctx.closePath();
        ctx.fillStyle = "rgba(255, 255, 255, 0.42)";
        ctx.fill();
      }

      ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
      ctx.font = "600 13px 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Neigungsrichtung", cx, cy - 72);
      ctx.restore();
    }

    function drawBall() {
      const ball = state.ball;
      const shadowScale = 1 + Math.min(Math.abs(ball.vy) / 900, 0.55);
      const shadowWidth = ball.radius * 1.7 * shadowScale;
      const shadowHeight = ball.radius * 0.42;
      const floorY = getFloorYAt(ball.x);
      const floorAngle = getFloorAngle();

      ctx.beginPath();
      ctx.ellipse(ball.x, floorY + ball.radius * 0.2, shadowWidth, shadowHeight, floorAngle, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
      ctx.fill();

      const gradient = ctx.createRadialGradient(
        ball.x - ball.radius * 0.35,
        ball.y - ball.radius * 0.45,
        ball.radius * 0.22,
        ball.x,
        ball.y,
        ball.radius
      );
      gradient.addColorStop(0, "#ffe1b5");
      gradient.addColorStop(0.55, "#f4a261");
      gradient.addColorStop(1, "#c46a2d");

      ctx.save();
      ctx.shadowColor = "rgba(0, 0, 0, 0.22)";
      ctx.shadowBlur = 18;
      ctx.shadowOffsetY = 8;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.restore();

      ctx.beginPath();
      ctx.arc(ball.x - ball.radius * 0.28, ball.y - ball.radius * 0.34, ball.radius * 0.22, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, 0.22)";
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, state.width, state.height);
      drawBackground();
      drawBall();
    }

    function frame(now) {
      const dt = Math.min((now - state.lastTime) / 1000, 1 / 30);
      state.lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(frame);
    }

    canvas.addEventListener("pointerdown", startDrag);
    canvas.addEventListener("pointermove", moveDrag);
    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);
    canvas.addEventListener("lostpointercapture", (event) => {
      if (state.ball.dragged && event.pointerId === state.ball.pointerId) {
        endDrag(event);
      }
    });

    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", resize);
    document.addEventListener("gesturestart", (event) => event.preventDefault());
    document.addEventListener("gesturechange", (event) => event.preventDefault());
    document.addEventListener("wheel", (event) => {
      if (event.ctrlKey) {
        event.preventDefault();
      }
    }, { passive: false });
    sensorButton.addEventListener("click", enableMotion);

    setSensorStatus("Sensoren sind noch nicht aktiviert. Tippe auf den Button fuer die Freigabe.", true);
    resize();
    draw();
    requestAnimationFrame((time) => {
      state.lastTime = time;
      requestAnimationFrame(frame);
    });
  </script>
</body>
</html>
